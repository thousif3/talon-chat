<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TALON — AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #020408;
      color: #e8f4ff;
    }
    #stars { position: fixed; inset: 0; z-index: 0; }
    .app {
      position: relative;
      z-index: 1;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      perspective: 1000px;
      padding: 12px;
      max-width: 900px;
      margin: 0 auto;
    }
    .chat-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      transform: rotateX(1.5deg);
      transform-style: preserve-3d;
      background: rgba(10, 20, 40, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid transparent;
      background-clip: padding-box;
      position: relative;
      overflow: hidden;
      animation: border-glow 4s linear infinite;
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.08);
    }
    .chat-shell::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(120deg, #00d4ff, #0066ff, #00d4ff, #0066ff);
      background-size: 300% 300%;
      animation: border-glow 4s linear infinite;
      z-index: -1;
    }
    @keyframes border-glow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.15);
    }
    .logo {
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: 0.25em;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
      animation: glitch 3s infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
    }
    .header-meta { font-size: 0.7rem; color: #6b8ab0; font-family: 'JetBrains Mono', monospace; text-align: right; }
    .online {
      color: #00d4ff;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      flex-wrap: wrap;
    }
    .toolbar button {
      font-size: 0.65rem;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      background: rgba(0, 102, 255, 0.15);
      color: #00d4ff;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scroll-behavior: smooth;
    }
    .msg {
      display: flex;
      margin-bottom: 14px;
      max-width: 85%;
    }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .msg.user .bubble {
      background: rgba(0, 212, 255, 0.12);
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.25);
      border: 1px solid rgba(0, 212, 255, 0.35);
    }
    .msg.assistant .bubble {
      background: rgba(0, 40, 80, 0.5);
      border: 1px solid rgba(0, 102, 255, 0.35);
    }
    .bubble pre {
      background: #0a1628;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      margin: 8px 0;
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 0.6rem;
      padding: 2px 6px;
      cursor: pointer;
      border: 1px solid #00d4ff;
      background: transparent;
      color: #00d4ff;
      border-radius: 4px;
    }
    .model-badge {
      font-size: 0.6rem;
      color: #6b8ab0;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .status-line { font-size: 0.75rem; color: #00d4ff; font-style: italic; margin: 8px 0; }
    .dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #00d4ff;
      border-radius: 50%;
      margin-right: 4px;
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .composer {
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(0, 212, 255, 0.12);
    }
    .input-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: rgba(10, 20, 40, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 999px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      padding: 8px 12px 8px 16px;
      transition: box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.35);
      border-color: #00d4ff;
    }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #e8f4ff;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .send-btn, .file-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #0066ff);
      color: #020408;
      cursor: pointer;
      font-weight: 700;
    }
    .file-btn { background: rgba(0, 102, 255, 0.4); color: #00d4ff; font-size: 1rem; }
    .slash-menu {
      position: absolute;
      bottom: 100%;
      left: 16px;
      right: 16px;
      background: rgba(10, 20, 40, 0.95);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .slash-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: #e8f4ff;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }
    .slash-menu button:hover { background: rgba(0, 212, 255, 0.1); }
    .error-bar {
      background: rgba(255, 60, 60, 0.15);
      border: 1px solid rgba(255, 100, 100, 0.4);
      padding: 10px 16px;
      margin: 8px 16px;
      border-radius: 10px;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .composer-inner { position: relative; }
    @media (max-width: 600px) {
      .app { padding: 6px; }
      .chat-shell { transform: none; }
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const API = window.location.origin + '/api/chat/stream';
    const STORAGE_KEY = 'talon_chat_v2';
    const SLASH = [
      { cmd: '/think', desc: 'Deep reasoning (qwen2.5:7b)' },
      { cmd: '/web', desc: 'Fetch URL content' },
      { cmd: '/search', desc: 'Web search (Serper)' },
      { cmd: '/file', desc: 'Upload text file' },
    ];

    function StarField() {
      useEffect(() => {
        const c = document.getElementById('stars');
        const ctx = c.getContext('2d');
        let w, h, stars;
        const resize = () => {
          w = c.width = window.innerWidth;
          h = c.height = window.innerHeight;
          stars = Array.from({ length: 200 }, () => ({
            x: Math.random() * w,
            y: Math.random() * h,
            z: Math.random() * 0.5 + 0.2,
          }));
        };
        resize();
        window.addEventListener('resize', resize);
        let t = 0;
        const draw = () => {
          t += 0.002;
          ctx.fillStyle = '#020408';
          ctx.fillRect(0, 0, w, h);
          stars.forEach(s => {
            s.x += s.z * 0.15;
            if (s.x > w) s.x = 0;
            ctx.fillStyle = `rgba(200, 230, 255, ${0.3 + s.z * 0.5})`;
            ctx.fillRect(s.x, s.y + Math.sin(t + s.x) * 2, 1.5, 1.5);
          });
          requestAnimationFrame(draw);
        };
        draw();
        return () => window.removeEventListener('resize', resize);
      }, []);
      return null;
    }

    function renderMarkdown(text) {
      const html = marked.parse(text || '');
      return { __html: html };
    }

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [command, setCommand] = useState(null);
      const [loading, setLoading] = useState(false);
      const [stream, setStream] = useState('');
      const [status, setStatus] = useState('');
      const [error, setError] = useState(null);
      const [model, setModel] = useState('phi4-mini');
      const [clock, setClock] = useState('');
      const [showSlash, setShowSlash] = useState(false);
      const listRef = useRef(null);
      const fileRef = useRef(null);
      const burstRef = useRef(null);

      useEffect(() => {
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (s) setMessages(JSON.parse(s).slice(-50));
        } catch {}
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages.slice(-50)));
      }, [messages]);

      useEffect(() => {
        const tick = () => setClock(new Date().toLocaleTimeString());
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        listRef.current?.scrollTo({ top: listRef.current.scrollHeight, behavior: 'smooth' });
      }, [messages, stream, status]);

      const detectCommand = (text) => {
        const t = text.trim();
        for (const s of SLASH) {
          if (t.startsWith(s.cmd)) return s.cmd;
        }
        return null;
      };

      const send = async () => {
        const text = input.trim();
        if (!text || loading) return;
        setError(null);
        const cmd = detectCommand(text);
        setCommand(cmd);
        setModel(cmd === '/think' ? 'qwen2.5:7b' : 'phi4-mini');
        const userMsg = { role: 'user', content: text };
        const history = [...messages, userMsg].slice(-20);
        setMessages(history);
        setInput('');
        setLoading(true);
        setStream('');
        setStatus('');

        if (burstRef.current) {
          burstRef.current.classList.add('burst');
          setTimeout(() => burstRef.current?.classList.remove('burst'), 400);
        }

        try {
          const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history, command: cmd }),
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let acc = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split('\n\n');
            buffer = parts.pop() || '';
            for (const block of parts) {
              const m = block.match(/^data: (.+)$/);
              if (!m) continue;
              try {
                const d = JSON.parse(m[1]);
                if (d.type === 'token') { acc += d.text; setStream(acc); }
                else if (d.type === 'status') setStatus(d.text);
                else if (d.type === 'error') throw new Error(d.text);
              } catch (e) {
                if (e.message && !e.message.includes('JSON')) throw e;
              }
            }
          }

          const assistant = { role: 'assistant', content: acc || '(empty)' };
          setMessages([...history, assistant]);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
          setStream('');
          setStatus('');
          setCommand(null);
        }
      };

      const onFile = (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          const content = String(r.result).slice(0, 12000);
          setInput(`/file\n\n${content}`);
          setCommand('/file');
        };
        r.readAsText(f);
      };

      const exportMd = () => {
        const md = messages.map(m => `**${m.role}**: ${m.content}`).join('\n\n');
        const blob = new Blob([md], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'talon-chat.md';
        a.click();
      };

      const newChat = () => {
        setMessages([]);
        localStorage.removeItem(STORAGE_KEY);
      };

      return (
        <div className="app">
          <StarField />
          <div className="chat-shell" ref={burstRef}>
            <header>
              <div className="logo">TALON</div>
              <div className="header-meta">
                <div>{clock}</div>
                <div className="online">● ONLINE</div>
                <div className="model-badge">model: {model}</div>
              </div>
            </header>
            <div className="toolbar">
              <button type="button" onClick={newChat}>New conversation</button>
              <button type="button" onClick={exportMd}>Export MD</button>
            </div>
            {error && (
              <div className="error-bar">
                <span>{error}</span>
                <button type="button" onClick={() => setError(null)}>Retry</button>
              </div>
            )}
            <div className="messages" ref={listRef}>
              {messages.map((m, i) => (
                <div key={i} className={`msg ${m.role === 'user' ? 'user' : 'assistant'}`}>
                  <div className="bubble">
                    {m.role === 'assistant' ? (
                      <div dangerouslySetInnerHTML={renderMarkdown(m.content)} />
                    ) : (
                      <p style={{ whiteSpace: 'pre-wrap' }}>{m.content}</p>
                    )}
                  </div>
                </div>
              ))}
              {status && <div className="status-line">{command === '/think' ? '⚙ ' : ''}{status}</div>}
              {stream && (
                <div className="msg assistant">
                  <div className="bubble">
                    <div dangerouslySetInnerHTML={renderMarkdown(stream)} />
                  </div>
                </div>
              )}
              {loading && !stream && (
                <div className="msg assistant">
                  <div className="bubble dots"><span /><span /><span /></div>
                </div>
              )}
            </div>
            <footer className="composer">
              <div className="composer-inner">
                {showSlash && (
                  <div className="slash-menu">
                    {SLASH.map(s => (
                      <button key={s.cmd} type="button" onClick={() => { setInput(s.cmd + ' '); setShowSlash(false); }}>
                        {s.cmd} — {s.desc}
                      </button>
                    ))}
                  </div>
                )}
                <div className="input-wrap">
                  <input type="file" ref={fileRef} hidden accept=".txt,.md,.json,.csv,.log" onChange={onFile} />
                  <button type="button" className="file-btn" onClick={() => fileRef.current?.click()} title="/file">📎</button>
                  <textarea
                    value={input}
                    rows={1}
                    placeholder="Message TALON… /think /web /search /file"
                    onChange={e => {
                      setInput(e.target.value);
                      setShowSlash(e.target.value === '/' || (e.target.value.startsWith('/') && !e.target.value.includes(' ')));
                    }}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
                    }}
                  />
                  <button type="button" className="send-btn" onClick={send} disabled={loading}>→</button>
                </div>
              </div>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
