<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALON Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030508;--bg2:#070c14;--bg3:#0d1525;
  --border:rgba(99,179,237,0.12);--border2:rgba(99,179,237,0.28);
  --blue:#4f8ef7;--cyan:#22d3ee;--green:#34d399;--orange:#fb923c;
  --red:#f87171;--purple:#c084fc;--text:#dde4f0;--muted:#4a5878;--muted2:#6b7fa0;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,179,237,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,0.06) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* Header */
header{background:rgba(7,12,20,0.95);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-badge{font-family:var(--mono);font-size:11px;color:var(--cyan);background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);padding:5px 10px;letter-spacing:.1em}
.header-title{font-size:16px;font-weight:600;letter-spacing:.06em}
.header-title span{color:var(--cyan)}
.status-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);padding:4px 10px}
.dot{width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* API key setup */
.setup-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--bg2);border:1px solid var(--border2);padding:40px;max-width:480px;width:100%;text-align:center}
.setup-card h2{font-size:20px;font-weight:600;margin-bottom:8px}
.setup-card p{font-size:14px;color:var(--muted2);line-height:1.7;margin-bottom:24px}
.setup-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:12px 14px;outline:none;margin-bottom:12px;transition:border-color .2s}
.setup-input:focus{border-color:var(--border2)}
.setup-btn{width:100%;padding:12px;background:var(--cyan);color:var(--bg);font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.08em;border:none;cursor:pointer;transition:all .2s}
.setup-btn:hover{background:var(--blue);box-shadow:0 4px 20px rgba(34,211,238,.3)}
.setup-note{font-size:11px;color:var(--muted);margin-top:12px;font-family:var(--mono)}
.setup-note a{color:var(--blue)}

/* Context bar */
.context-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:16px;flex-wrap:wrap;flex-shrink:0}
.ctx-item{font-family:var(--mono);font-size:10px;color:var(--muted2);display:flex;align-items:center;gap:5px}
.ctx-item b{color:var(--text)}
.ctx-item.loading{color:var(--muted)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2)}

/* Welcome */
.welcome{text-align:center;margin:auto;max-width:500px;padding:40px 20px}
.welcome h3{font-size:22px;font-weight:600;margin-bottom:8px;letter-spacing:-.01em}
.welcome p{font-size:14px;color:var(--muted2);line-height:1.7;margin-bottom:28px}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.suggestion{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;font-size:12px;color:var(--muted2);cursor:pointer;text-align:left;transition:all .2s;font-family:var(--sans)}
.suggestion:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.suggestion-icon{font-size:14px;margin-bottom:4px;display:block}

/* Message bubbles */
.msg{display:flex;gap:10px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.msg.assistant .msg-avatar{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.2);color:var(--cyan)}
.msg.user .msg-avatar{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);color:var(--blue)}
.msg-content{max-width:72%;background:var(--bg2);border:1px solid var(--border);padding:12px 16px;font-size:14px;line-height:1.7;color:var(--text)}
.msg.user .msg-content{background:rgba(79,142,247,.08);border-color:rgba(79,142,247,.2)}
.msg-content code{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;color:var(--cyan)}
.msg-content pre{background:var(--bg3);border:1px solid var(--border);padding:12px;font-family:var(--mono);font-size:12px;overflow-x:auto;margin:8px 0;color:var(--muted2)}
.msg-content strong{color:var(--text);font-weight:600}
.msg-content ul,ol{padding-left:18px;margin:6px 0}
.msg-content li{margin:3px 0}
.msg-time{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;text-align:right}
.msg.assistant .msg-time{text-align:left}

/* Typing indicator */
.typing .msg-content{padding:14px 18px}
.typing-dots{display:flex;gap:4px;align-items:center}
.typing-dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:typingBounce .8s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Input area */
.input-area{background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;position:relative}
textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;padding:12px 14px;resize:none;outline:none;max-height:140px;min-height:44px;line-height:1.5;transition:border-color .2s;overflow-y:auto}
textarea:focus{border-color:var(--border2)}
textarea::placeholder{color:var(--muted)}
.send-btn{width:44px;height:44px;background:var(--cyan);color:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s}
.send-btn:hover{background:var(--blue);box-shadow:0 4px 16px rgba(34,211,238,.3)}
.send-btn:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.input-hint{font-family:var(--mono);font-size:10px;color:var(--muted)}
.clear-btn{font-family:var(--mono);font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;transition:color .2s}
.clear-btn:hover{color:var(--red)}

/* Model badge */
.model-badge{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;margin-left:8px;vertical-align:middle}

/* Error message */
.error-msg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:10px 14px;font-size:13px;font-family:var(--mono)}

@media(max-width:600px){
  .suggestions{grid-template-columns:1fr}
  .msg-content{max-width:88%}
  header{padding:12px 14px}
  .messages{padding:14px}
  .input-area{padding:12px 14px}
  .context-bar{padding:6px 14px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="logo-badge">T A L O N</div>
      <div>
        <div class="header-title"><span>TALON</span> Chat</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="model-badge" id="model-label">gemini-1.5-flash</span>
      <div class="status-pill"><div class="dot"></div><span id="status-text">ONLINE</span></div>

    </div>
  </header>

  <!-- No setup screen -- key injected at build time -->

  <!-- Main Chat -->
  <div id="chat-screen" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <!-- Context bar -->
    <div class="context-bar" id="context-bar">
      <div class="ctx-item loading" id="ctx-jobs">⟳ Loading TALON stats...</div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h3>What do you want to know?</h3>
        <p>I have live context about your TALON system — job pipeline, news, application status, and more. Ask me anything.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="What's my current job search status?">
            <span class="suggestion-icon">💼</span>What's my current job search status?
          </button>
          <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="Summarize today's news brief for me">
            <span class="suggestion-icon">📰</span>Summarize today's news brief
          </button>
          <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="How is TALON performing? What ran today?">
            <span class="suggestion-icon">⚡</span>How is TALON performing today?
          </button>
          <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="What are my top job matches right now?">
            <span class="suggestion-icon">⭐</span>What are my top job matches?
          </button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="msg-input" placeholder="Ask anything about your job search, TALON status, news..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Enter to send · Shift+Enter for new line</span>
        <button class="clear-btn" onclick="clearChat()">Clear chat</button>
      </div>
    </div>
  </div>
</div>

<script>
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
const STATS_URL  = 'https://thousif3.github.io/talon-stats/stats.json';

let apiKey    = '__GEMINI_API_KEY__'; // replaced by TALON at build time
let talonCtx  = null;
let messages  = []; // conversation history

// Key injected at build time by TALON github-export.mjs
// No setup screen needed

// ── Load TALON context ────────────────────────────────────────
async function loadTalonContext() {
  try {
    const res  = await fetch(STATS_URL + '?t=' + Date.now());
    talonCtx   = await res.json();
    const p    = talonCtx.pipeline;
    const age  = talonCtx.generatedAt ? Math.floor((Date.now() - new Date(talonCtx.generatedAt)) / 3600000) : null;
    const stale = age !== null && age > 24;

    document.getElementById('context-bar').innerHTML = [
      `<div class="ctx-item">Jobs: <b>${p.jobsScanned}</b></div>`,
      `<div class="ctx-item">Score 7+: <b>${p.score7plus}</b></div>`,
      `<div class="ctx-item">Interviews: <b>${p.interviews}</b></div>`,
      `<div class="ctx-item">Rejections: <b>${p.rejections}</b></div>`,
      `<div class="ctx-item">CRM: <b>${p.crmTracked}</b></div>`,
      stale
        ? `<div class="ctx-item" style="color:var(--orange)">⚠ Data ${age}h old</div>`
        : `<div class="ctx-item" style="color:var(--green)">● Live · ${talonCtx.generatedAtET}</div>`,
    ].join('');
  } catch(e) {
    document.getElementById('context-bar').innerHTML = '<div class="ctx-item" style="color:var(--muted)">⚠ Could not load TALON stats — general chat only</div>';
  }
}

// ── Build system prompt ───────────────────────────────────────
function buildSystemPrompt() {
  const base = `You are TALON, a personal AI assistant for Thousifuddin Shaik (MS CS student at Indiana University Indianapolis, CSM+CSPO certified PM, F-1 OPT). You are helpful, direct, and concise. You avoid AI-writing clichés and write like a knowledgeable friend.`;

  if (!talonCtx) return base + '\n\nNote: Live TALON system stats are currently unavailable.';

  const p  = talonCtx.pipeline;
  const n  = talonCtx.recentNews || {};
  const j  = (talonCtx.topJobs || []).map((j,i) => `${i+1}. ${j.title} @ ${j.company} (${j.location}) -- ${j.score}/10`).join('\n');

  return `${base}

LIVE TALON SYSTEM CONTEXT (as of ${talonCtx.generatedAtET}):

Job Pipeline:
- Jobs scanned: ${p.jobsScanned} | Eligible: ${p.eligible} | Score 7+: ${p.score7plus}
- Approved: ${p.approved} | Applications sent: ${p.applications}
- Interviews: ${p.interviews} | Rejections: ${p.rejections} | Recruiters: ${p.recruiters}
- CRM tracked: ${p.crmTracked}

Top Job Matches:
${j || 'No matches loaded yet'}

Recent News Highlights:
- Visa/Immigration: ${n.visa || 'Not available'}
- Tech & Hiring: ${n.tech || 'Not available'}
- Breaking: ${n.breaking || 'Not available'}

AI Costs: $${talonCtx.aiCosts?.totalSpent || 0} total spent | ${talonCtx.aiCosts?.totalCalls || 0} API calls

Answer questions about job search status, TALON system performance, news, and anything else. Be specific using the data above when relevant.`;
}

// ── Show chat screen ──────────────────────────────────────────
async function showChat() {
  document.getElementById('chat-screen').style.display = 'flex';
  await loadTalonContext();
  document.getElementById('msg-input').focus();
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage(text) {
  const input = document.getElementById('msg-input');
  const content = (text || input.value).trim();
  if (!content || !apiKey) return;

  input.value = '';
  autoResize(input);
  hideWelcome();

  // Add user message
  messages.push({ role: 'user', parts: [{ text: content }] });
  appendMessage('user', content);

  // Show typing
  const typingId = appendTyping();
  document.getElementById('send-btn').disabled = true;

  try {
    const body = {
      system_instruction: { parts: [{ text: buildSystemPrompt() }] },
      contents: messages,
      generationConfig: { temperature: 0.7, maxOutputTokens: 1500 },
    };

    const res  = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
    messages.push({ role: 'model', parts: [{ text: reply }] });

    removeTyping(typingId);
    appendMessage('assistant', reply);
  } catch(e) {
    removeTyping(typingId);
    appendError(e.message.includes('API_KEY') ? 'Invalid API key. Click "CHANGE KEY" to update.' : e.message);
  }
  document.getElementById('send-btn').disabled = false;
}

function sendSuggestion(q) { sendMessage(q); }

// ── DOM helpers ───────────────────────────────────────────────
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true, timeZone:'America/Indiana/Indianapolis' });
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? 'YOU' : 'AI'}</div>
    <div>
      <div class="msg-content">${formatMessage(text)}</div>
      <div class="msg-time">${time} ET</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const id   = 'typing-' + Date.now();
  const div  = document.createElement('div');
  div.className = 'msg assistant typing';
  div.id = id;
  div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-content"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function appendError(msg) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = '⚠ ' + msg;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function formatMessage(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm, '<strong>$1</strong>')
    .replace(/^# (.+)$/gm, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
}

function clearChat() {
  messages = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  // Re-add welcome
  msgs.innerHTML = `<div class="welcome" id="welcome">
    <h3>What do you want to know?</h3>
    <p>I have live context about your TALON system — job pipeline, news, application status, and more. Ask me anything.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="What's my current job search status?"><span class="suggestion-icon">💼</span>What's my current job search status?</button>
      <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="Summarize today's news brief for me"><span class="suggestion-icon">📰</span>Summarize today's news brief</button>
      <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="How is TALON performing? What ran today?"><span class="suggestion-icon">⚡</span>How is TALON performing today?</button>
      <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="What are my top job matches right now?"><span class="suggestion-icon">⭐</span>What are my top job matches?</button>
    </div>
  </div>`;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  showChat();
});
</script>
</body>
</html>
